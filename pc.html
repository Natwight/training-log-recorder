<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Training Log Recorder - PC</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/pc.css">

</head>
<body>

    <div class="date-and-body-box">
        <!--日付入力-->
        <div class="date-box">
            <label for="training-date">日付</label>
            <input type="date" id="training-date">
        </div>

        <!--体重入力-->
        <div class="body-weight-box">
            <label for="body-weight">体重</label>
            <div class="body-weight-input-box">
                <input type="number" id="body-weight" step="0.1" value="50.0">
                <span>kg</span>
            </div>
        </div>
    </div>

    <div class="pc-input-area">

        <!--内容選択-->
        <div class="contents-box">
            <!--部位選択-->
            <div class="part-box">
                <label for="body-part">部位</label>
                <select id="body-part">
                    <option value="chest" selected>胸</option>
                    <option value="back">背中</option>
                    <option value="shoulders">肩</option>
                    <option value="arms">腕</option>
                    <option value="legs">脚</option>
                    <option value="core">体幹</option>
                </select>
            </div>

            <div class="exercise-and-type">
                <!--種目選択-->
                <div class="exercise-box">
                    <label for="exercise">種目</label>
                    <select id="exercise"></select>
                </div>

                <!--タイプ選択-->
                <div class="exerciseType-box">
                    <label for="exerciseType">タイプ</label>
                    <select id="exerciseType">
                        <option value="weight" selected>ウェイト</option>
                        <option value="assisted_bodyweight">アシスト</option>
                        <option value="bodyweight">自重</option>
                    </select>
                </div>
            </div>
        </div>

        <!--直近の記録3回分を表示するエリア-->
        <div class="past-records">
            <p class="past-records-title">直近3回</p>

            <div id="past-records-grid" class="past-records-grid">
                <div></div>
                <div>-</div>
                <div>-</div>
                <div>-</div>

                <div>1set</div>
                <div>-</div>
                <div>-</div>
                <div>-</div>

                <div>2set</div>
                <div>-</div>
                <div>-</div>
                <div>-</div>

                <div>3set</div>
                <div>-</div>
                <div>-</div>
                <div>-</div>
            </div>
        </div>

        <!--重量と回数入力-->
        <div class="sets-box">

            <!--1セット目-->
            <div class="set1-box">
                <span>1セット目</span>
                <div class="set1-weight-reps-box">
                    <!--重量入力-->
                    <label for="set1-weight">重量</label>
                    <select id="set1-weight"></select>
        
                    <!--回数入力-->
                    <label for="set1-reps">回数</label>
                    <select id="set1-reps"></select>        
                </div>
            </div>

            <!--2セット目-->
            <div class="set2-box"> 
                <span>2セット目</span>
                <div class="set2-weight-reps-box">     
                    <!--重量入力-->
                    <label for="set2-weight">重量</label>
                    <select id="set2-weight"></select>
      
                    <!--回数入力-->
                    <label for="set2-reps">回数</label>
                    <select id="set2-reps"></select>
                </div>
            </div>

            <!--3セット目-->
            <div class="set3-box">
                <span>3セット目</span>
                <div class="set3-weight-reps-box">
                    <!--重量入力-->
                    <label for="set3-weight">重量</label>
                    <select id="set3-weight"></select>
      
                    <!--回数入力-->
                    <label for="set3-reps">回数</label>
                    <select id="set3-reps"></select>
                </div>
            </div>
        </div>

        <div class="json-box">
            <!--JSON書き出しボタン-->
            <button type="button" id="create-json-button">新しいJSONファイルに記録</button>

            <!--JSONファイル保存ボタン-->
            <button type="button" id="download-json-button">JSONファイルを保存</button>
        </div>

        <!--JSON表示エリア-->
        <pre id="json-output"></pre>  

    </div>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/select-options.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pc-record.js"></script>

</body>
</html>
