<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Training Log Recorder</title>

  <!-- mobile用 index.html -->
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/mobile.css">

</head>
<body>

  <div class="date-and-body-box">
    <!--日付入力-->
    <div class="date-box">
      <label for="training-date">日付</label>
      <input type="date" id="training-date">
    </div>

    <!--体重入力-->
    <div class="body-weight-box">
      <label for="body-weight">体重</label>
      <div class="body-weight-input-box">
        <input type="number" id="body-weight" step="0.1" value="50.0">
        <span>kg</span>
      </div>
    </div>
  </div>


  <!--参照・記録エリア-->
  <div id="reference-area" class="reference-area">

    <!--部位・種目・タイプ選択-->
    <div class="reference-select-box">

      <!--部位選択-->
      <div class="reference-part-box">
        <label for="reference-body-part">部位</label>
        <select id="reference-body-part">
          <option value="chest" selected>胸</option>
          <option value="back">背中</option>
          <option value="shoulders">肩</option>
          <option value="arms">腕</option>
          <option value="legs">脚</option>
          <option value="core">体幹</option>
        </select>
      </div>

      <!--種目選択-->
      <div class="reference-exercise-box">
        <label for="reference-exercise">種目</label>
        <select id="reference-exercise"></select>
      </div>

      <!--タイプ表示・選択-->
      <div class="reference-type-box">
        <label for="reference-exercise-type">タイプ</label>
        <select id="reference-exercise-type">
          <option value="weight">ウェイト</option>
          <option value="assisted_bodyweight">アシスト</option>
          <option value="bodyweight">自重</option>
        </select>
      </div>

    </div>

    <!--直近3回の記録-->
    <div class="reference-past-records">
      <p class="past-records-title">直近3回</p>

      <div id="reference-past-records-grid" class="past-records-grid">
        <div></div>
        <div>-</div>
        <div>-</div>
        <div>-</div>

        <div>1set</div>
        <div>-</div>
        <div>-</div>
        <div>-</div>

        <div>2set</div>
        <div>-</div>
        <div>-</div>
        <div>-</div>

        <div>3set</div>
        <div>-</div>
        <div>-</div>
        <div>-</div>
      </div>
    </div>

    <!--今回のセット入力-->
    <div class="reference-sets-box">

      <!--1セット目-->
      <div class="reference-set-box">
        <span>1セット目</span>

        <div class="reference-weight-reps-box">
          <label for="reference-set1-weight">重量</label>
          <select id="reference-set1-weight"></select>

          <label for="reference-set1-reps">回数</label>
          <select id="reference-set1-reps"></select>
        </div>
      </div>

      <!--2セット目-->
      <div class="reference-set-box">
        <span>2セット目</span>

        <div class="reference-weight-reps-box">
          <label for="reference-set2-weight">重量</label>
          <select id="reference-set2-weight"></select>

          <label for="reference-set2-reps">回数</label>
          <select id="reference-set2-reps"></select>
        </div>
      </div>

      <!--3セット目-->
      <div class="reference-set-box">
        <span>3セット目</span>

        <div class="reference-weight-reps-box">
          <label for="reference-set3-weight">重量</label>
          <select id="reference-set3-weight"></select>

          <label for="reference-set3-reps">回数</label>
          <select id="reference-set3-reps"></select>
        </div>
      </div>

    </div>

    <!--入力確定ボタン-->
    <button type="button" id="reference-add-button">入力を確定する</button>

    <!--実施済み種目-->
    <div class="training-date-records-box">
      <p class="training-date-records-title">一時保存中の記録</p>
      <div id="training-date-records-list"></div>
    </div>

    <button type="button" id="clear-local-records-button">
    一時記録を削除
    </button>
  </div>



  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/select-options.js"></script>
  <script src="js/mobile.js"></script>
</body>
</html>
